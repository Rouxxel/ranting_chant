version: "3.9"

services:
  api:
    build: 
      context: .
      dockerfile: DOCKERFILE
    container_name: ranting_chant_backend
    env_file: .env
    ports:
      - "${SERVER_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs  # Persist logs
    environment:
      - PYTHONUNBUFFERED=1
      - API_TITLE=${API_TITLE:-Ranting Chant restful API}
      - API_VERSION=${API_VERSION:-1.0.0}
      - API_DESCRIPTION=${API_DESCRIPTION:-backend for ranting chant application, built with FastAPI}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-8000}
      # AI Service Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      # Notification Service Keys
      - RESEND_API_KEY=${RESEND_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_VERIFIED_PHONE=${TWILIO_VERIFIED_PHONE}
      - TWILIO_API_KEY_SID=${TWILIO_API_KEY_SID}
      - TWILIO_API_KEY_SECRET=${TWILIO_API_KEY_SECRET}
      # Supabase Configuration (if using PostgreSQL)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Uncomment below for development with live reload
    # volumes:
    #   - .:/app
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

